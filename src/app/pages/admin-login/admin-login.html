<div style="max-width: 400px; margin: 80px auto; padding: 30px; background: #34495e; color: white; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
  <h2 style="text-align: center; margin-bottom: 20px;">⚙️ Espace Gérant</h2>

  <div *ngIf="messageErreur" style="color: #ffcccc; background: rgba(255,0,0,0.2); padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center;">
    {{ messageErreur }}
  </div>

  <form (ngSubmit)="seConnecterAdmin()">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Email Pro :</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" required style="width: 100%; padding: 10px; border-radius: 4px; border: none;">
    </div>
    <div style="margin-bottom: 25px;">
      <label style="display: block; margin-bottom: 5px;">Mot de passe :</label>
      <input type="password" [(ngModel)]="credentials.motDePasse" name="motDePasse" required style="width: 100%; padding: 10px; border-radius: 4px; border: none;">
    </div>
    <button type="submit" style="width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.1rem;">
      Accéder au tableau de bord
    </button>
  </form>
</div>
