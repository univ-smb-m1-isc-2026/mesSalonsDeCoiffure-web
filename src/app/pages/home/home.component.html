<h1>Trouvez votre salon de coiffure ✂️</h1>

<div *ngIf="salons.length === 0">Aucun salon disponible pour le moment.</div>

<ul style="list-style-type: none; padding: 0;">
  <li *ngFor="let salon of salons" style="border: 1px solid #ccc; margin: 10px 0; padding: 15px; border-radius: 8px;">
    <h3>{{ salon.nom }}</h3>
    <p>📍 {{ salon.adresse }}</p>
    <button>Voir les créneaux disponibles</button>
  </li>
</ul>
