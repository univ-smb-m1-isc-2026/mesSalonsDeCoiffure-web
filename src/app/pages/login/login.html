<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
  <h2 style="text-align: center;">Connexion</h2>

  <div *ngIf="messageErreur" style="color: red; background: #fee; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    {{ messageErreur }}
  </div>

  <form (ngSubmit)="seConnecter()">
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Email :</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Mot de passe :</label>
      <input type="password" [(ngModel)]="credentials.motDePasse" name="motDePasse" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <button type="submit" style="width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Se connecter
    </button>
  </form>

  <p style="text-align: center; margin-top: 20px; font-size: 0.9em;">
    Pas encore de compte ? <a routerLink="/register" style="color: #2980b9; text-decoration: none;">Créer un compte</a>
  </p>
</div>
