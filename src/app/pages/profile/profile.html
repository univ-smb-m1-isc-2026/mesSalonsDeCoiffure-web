<div class="profile-container">
  <h2 class="profile-title">Mon Profil</h2>

  <div *ngIf="message" class="alert alert-success">
    {{ message }}
  </div>

  <div *ngIf="erreur" class="alert alert-error">
    {{ erreur }}
  </div>

  <form (ngSubmit)="sauvegarderProfil()" class="profile-form">

    <div class="form-row">
      <label class="form-group">
        <b>Prénom</b>
        <input type="text" [(ngModel)]="utilisateur.prenom" name="prenom" required class="form-input">
      </label>
      <label class="form-group">
        <b>Nom</b>
        <input type="text" [(ngModel)]="utilisateur.nom" name="nom" required class="form-input">
      </label>
    </div>

    <label class="form-group">
      <b>Email</b>
      <input type="email" [(ngModel)]="utilisateur.email" name="email" disabled class="form-input input-disabled">
      <small class="helper-text">L'email est votre identifiant et ne peut pas être modifié.</small>
    </label>

    <label class="form-group">
      <b>Numéro de Téléphone (Pour WhatsApp)</b>
      <input type="tel" [(ngModel)]="utilisateur.telephone" name="tel" placeholder="+33 6 12 34 56 78" class="form-input">
    </label>

    <hr class="separator">

    <h3 class="section-subtitle">Préférences</h3>

    <label class="checkbox-label">
      <input type="checkbox" [(ngModel)]="utilisateur.rappelsReguliers" name="rappels" class="checkbox-input">
      Me rappeler de prendre rendez-vous tous les mois (Coupe d'entretien)
    </label>

    <label class="checkbox-label">
      <input type="checkbox" [(ngModel)]="utilisateur.notifsWhatsapp" name="whatsapp" class="checkbox-input">
      Recevoir un rappel WhatsApp 24h avant mon rendez-vous
    </label>

    <button type="submit" class="btn-submit">
      💾 Enregistrer mes préférences
    </button>
  </form>

  <h3 class="section-title">📅 Mes Rendez-vous à venir</h3>

  <div *ngIf="mesRendezVous.length === 0" class="empty-state">
    Vous n'avez aucun rendez-vous de prévu.
  </div>

  <div *ngFor="let rdv of mesRendezVous" class="rdv-card">
    <div>
      <strong class="rdv-title">{{ rdv.prestation.nom }}</strong><br>
      <span class="rdv-date">Le {{ rdv.dateHeureDebut | date:'dd/MM/yyyy à HH:mm' }}</span><br>
      <small class="rdv-details">📍 {{ rdv.salon.nom }} (avec {{ rdv.employe.nom }})</small>
    </div>

    <button (click)="anticiperRendezVous(rdv)" class="btn-anticipate">
      🕒 Anticiper / Déplacer
    </button>
  </div>
</div>
