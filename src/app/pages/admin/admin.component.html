<h1>Espace Administrateur 🛠️</h1>
<h2>Créer un nouveau salon</h2>

<form (ngSubmit)="ajouterSalon()" style="display: flex; flex-direction: column; max-width: 300px; gap: 10px;">

  <label>Nom du salon :</label>
  <input type="text" [(ngModel)]="nouveauSalon.nom" name="nom" required>

  <label>Adresse :</label>
  <input type="text" [(ngModel)]="nouveauSalon.adresse" name="adresse" required>

  <label>Latitude :</label>
  <input type="number" step="0.0001" [(ngModel)]="nouveauSalon.latitude" name="latitude">

  <label>Longitude :</label>
  <input type="number" step="0.0001" [(ngModel)]="nouveauSalon.longitude" name="longitude">

  <button type="submit" style="padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Enregistrer le salon
  </button>
</form>

<p style="margin-top: 15px; font-weight: bold;">{{ message }}</p>
